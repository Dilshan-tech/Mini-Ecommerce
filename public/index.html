<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Ecommerce Backend Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <div class="brand">
          <img src="logo.svg" alt="Mini Ecommerce logo" class="logo-mark" />
          <div>
            <h1 class="logo">Mini Ecommerce</h1>
            <p class="subtitle">Simple CRUD demo with JSON file storage</p>
          </div>
        </div>
        <nav class="nav">
          <a href="index.html" class="nav-link nav-link-active">Products</a>
          <a href="login.html" class="nav-link">Login</a>
          <a href="signup.html" class="nav-link">Sign Up</a>
          <a href="register.html" class="nav-link">Register</a>
          <span id="user-indicator" class="pill"></span>
        </nav>
      </div>
    </header>

    <main class="container main">
      <section class="card">
        <h2>Add / Edit Product</h2>
        <form id="product-form" class="form">
          <input type="hidden" id="product-id" />

          <div class="form-row">
            <label for="name">Product Name</label>
            <input
              type="text"
              id="name"
              placeholder="e.g. Wireless Headphones"
              required
            />
          </div>

          <div class="form-row">
            <label for="price">Price (₹)</label>
            <input
              type="number"
              id="price"
              placeholder="e.g. 1999"
              min="0"
              step="0.01"
              required
            />
          </div>

          <div class="form-row">
            <label for="imageUrl">Image URL (optional)</label>
            <input
              type="url"
              id="imageUrl"
              placeholder="Paste an image link here"
            />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn primary" id="submit-btn">
              Add Product
            </button>
            <button type="button" class="btn ghost" id="cancel-edit-btn">
              Cancel Edit
            </button>
          </div>
        </form>
      </section>

      <section class="products-section">
        <div class="products-header">
          <h2>Products</h2>
          <span id="products-count" class="badge">0 items</span>
        </div>
        <div id="products-list" class="products-grid"></div>
        <p id="empty-state" class="empty-state">
          No products yet. Add your first product using the form above.
        </p>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
  </html>
